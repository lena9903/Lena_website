<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=Manrope:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/desktop.css" />
  <link rel="stylesheet" href="css/content/about.css" />
  <link rel="stylesheet" href="css/content/projects.css" />
  <link rel="stylesheet" href="css/content/experience.css" />
  <link rel="stylesheet" href="css/content/skills.css" />
  <link rel="stylesheet" href="css/content/resume.css" />
  <link rel="stylesheet" href="css/content/contact.css" />
</head>
<body>

  <section class="laptop-section" id="laptop-section">
    <div class="laptop-sticky">
      <canvas id="laptop-canvas"></canvas>

      <!-- Windows-style interactive desktop — appears once the animation finishes -->
      <div class="desktop-overlay" id="desktop-overlay">
        <div class="desktop-icons" id="desktop-icons"></div>
        <div class="desktop-backdrop" id="desktop-backdrop"></div>
        <div class="desktop-windows" id="desktop-windows"></div>
      </div>
    </div>
  </section>

  <!-- GSAP + ScrollTrigger (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script src="js/scrollAnimation.js"></script>

  <!-- Per-folder content (each registers itself into window.FolderContent) -->
  <script src="js/content/about.js"></script>
  <script src="js/content/projects.js"></script>
  <script src="js/content/experience.js"></script>
  <script src="js/content/skills.js"></script>
  <script src="js/content/resume.js"></script>
  <script src="js/content/contact.js"></script>

  <script src="js/desktop.js"></script>

  <!-- مؤقت للتشخيص فقط — رح نشيله بعد ما نحل المشكلة -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
</body>
</html>
